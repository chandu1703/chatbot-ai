version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "Setting up environment variables..."
        - export GROQ_API_KEY=$GROQ_API_KEY
        - echo "Environment setup complete"
    build:
      commands:
        - echo "Starting build process..."
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*